<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoTrace - Gestión de Activos Segura</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilo básico de seguridad para inputs */
        input:invalid {
            border-color: #ef4444;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="theme-toggle" style="cursor: pointer; user-select: none;">🌓 CryptoTrace</h1>
        <div class="header-controls">
            <div class="total-box">
                <span>Inversión Total:</span>
                <strong id="total-general">0.00 €</strong>
            </div>
        </div>
    </header>

    <main>

        <div class="json-controls">
            <button id="import-btn" class="json-btn json-import">📂 Importar Datos</button>
            <input type="file" id="import-json" accept=".json" style="display:none;">
            <button id="export-json" class="json-btn json-export">💾 Exportar Datos</button>

            <div class="currency-switch">
                <span>EUR</span>
                <label class="switch">
                    <input type="checkbox" id="currency-toggle">
                    <span class="slider"></span>
                </label>
                <span>USD</span>
            </div>
        </div>

        <section class="form-container">
            <form id="crypto-form">
                <input type="date" id="input-fecha" required aria-label="Fecha de inversión">
                
                <input type="text" id="input-moneda" placeholder="Activo" 
                       required maxlength="10" pattern="[a-zA-Z0-9]+" 
                       title="Solo letras y números, sin espacios." aria-label="Nombre del activo">
                
                <input type="number" id="input-euros" placeholder="Inversión €" 
                       step="0.01" min="0" required aria-label="Cantidad invertida en Euros">
                
                <input type="number" id="input-cantidad" placeholder="Cantidad" 
                       step="any" min="0" required aria-label="Cantidad de activo recibida">
                
                <button type="submit">Añadir</button>
            </form>
        </section>

        <section class="table-wrapper">
            <table id="main-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Moneda</th>
                        <th>Inversión</th>
                        <th>Cantidad</th>
                        <th>Precio/U</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
